name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/reusable-dotnet-build.yml
    with:
      dotnet_version: 8.0.x
      solution_path: dotnet-github-actions-enterprise-pipeline.sln
      configuration: Release
      api_project_path: src/Sample.Api/Sample.Api.csproj
      artifact_name: sample-build-output
      version_prefix: "1.0"

  test:
    name: Test
    needs: build
    uses: ./.github/workflows/reusable-dotnet-test.yml
    with:
      dotnet_version: 8.0.x
      solution_path: dotnet-github-actions-enterprise-pipeline.sln
      configuration: Release

  package:
    name: Package
    needs:
      - build
      - test
    uses: ./.github/workflows/reusable-package.yml
    with:
      build_artifact_name: ${{ needs.build.outputs.build_artifact_name }}
      package_artifact_name: sample-release-package
      package_name: sample-api
      package_version: ${{ needs.build.outputs.package_version }}

  summarize:
    name: Summary
    needs:
      - build
      - test
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Write workflow summary
        shell: pwsh
        run: |
          "### CI result" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- Build artifact: `${{ needs.build.outputs.build_artifact_name }}`" >> $env:GITHUB_STEP_SUMMARY
          "- Package artifact: `${{ needs.package.outputs.package_artifact_name }}`" >> $env:GITHUB_STEP_SUMMARY
          "- Sample version: `${{ needs.build.outputs.package_version }}`" >> $env:GITHUB_STEP_SUMMARY
          "- Release model: build once, package once, promote later" >> $env:GITHUB_STEP_SUMMARY
